name: Build native host

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: yt-dlp-host-windows.exe
            pyinstaller_name: host.exe
          - os: macos-latest
            artifact: yt-dlp-host-macos
            pyinstaller_name: host
          - os: ubuntu-latest
            artifact: yt-dlp-host-linux
            pyinstaller_name: host

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: python build.py

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.pyinstaller_name }}" "dist/${{ matrix.artifact }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
